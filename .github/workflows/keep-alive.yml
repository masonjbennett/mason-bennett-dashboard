name: Keep Streamlit apps awake

on:
  schedule:
    - cron: "17 */4 * * *"   # every 4 hours
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping live demo apps
        run: |
          curl -sS -o /dev/null -w "budgeting-app: %{http_code}\n" "https://masonbennett-budget.streamlit.app/" || true
          curl -sS -o /dev/null -w "portfolio-app: %{http_code}\n" "https://portfolio-app-ifh8afmcuxkyr6ivov9fmj.streamlit.app/" || true
          curl -sS -o /dev/null -w "website: %{http_code}\n" "https://masonjbennett.com/" || true
