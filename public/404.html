<!DOCTYPE html>

    p { font-family: 'Segoe UI', sans-serif; color: #6f675c; font-size: 15px; margin-bottom: 32px; }

    .domain { position: fixed; bottom: 28px; font-family: Consolas, monospace; font-size: 11px; letter-spacing: 3px; color: #a2977f; }
  </style>
</head>

  <div class="bar"></div>
