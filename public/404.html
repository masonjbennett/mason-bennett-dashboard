<!DOCTYPE html>

  <title>Corrections — Mason J. Bennett</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #faf3ea; color: #262421; font-family: Georgia, 'Times New Roman', serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
    .bar { position: fixed; top: 0; left: 0; right: 0; height: 10px; background: #2b2825; }
    .rule { position: fixed; top: 10px; left: 0; right: 0; height: 2px; background: #0d6d56; }
    .box { max-width: 460px; border-top: 1px solid #262421; border-bottom: 1px solid #262421; padding: 26px 8px 22px; position: relative; }
    .box::before { content: ""; position: absolute; top: 3px; left: 0; right: 0; border-top: 1px solid #262421; }
    .kicker { font-family: Consolas, monospace; font-size: 10px; letter-spacing: 5px; color: #0d6d56; text-transform: uppercase; margin-bottom: 18px; text-align: center; }
    p { font-size: 16px; line-height: 1.75; color: #4a443c; text-align: center; }
    .err { font-family: Consolas, monospace; font-size: 11px; color: #8a8072; text-align: center; margin-top: 14px; letter-spacing: 2px; }
    .links { display: flex; gap: 18px; justify-content: center; margin-top: 26px; flex-wrap: wrap; }
    .links a { font-family: Consolas, monospace; font-size: 11px; letter-spacing: 1px; color: #0d6d56; text-decoration: none; border-bottom: 1px dotted #0d6d56; padding-bottom: 1px; }
    .domain { position: fixed; bottom: 26px; font-family: Consolas, monospace; font-size: 10px; letter-spacing: 3px; color: #a2977f; }
  </style>
</head>
